name: Docker Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker hub
        uses: docker/login-action@v2
        with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        run: docker build -t yuji09docker/portfolio-template:latest .
      - name: Push Docker image
        run : docker push yuji09docker/portfolio-template:latest
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 41.103.212.169 
          username: smack 
          key: 054090
        script: |
          docker pull yuji09docker/portfolio-template:latest
          docker stop app || true
          docker rm app || true
          docker run -d -p 5000:5000 --name app yuji09docker/portfolio-template